name: Android CI/CD - Build & Release APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - 'debug'
          - 'release'
          - 'both'
      create_release:
        description: 'Create a GitHub Release?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Regenerate Gradle Wrapper
        run: gradle wrapper --gradle-version 9.3.1

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Grant Gradle Wrapper Permissions
        run: chmod +x gradlew

      - name: Decode Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Warning: debug.keystore.base64 not found — using default debug signing."
          fi

      - name: Configure Environment Variables
        run: |
          if [ ! -f .env ]; then
            touch .env
          fi

      - name: Build Debug APK
        if: |
          github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'))
        run: ./gradlew assembleDebug --parallel --build-cache --daemon

      - name: Prepare and Build Release APK
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && (github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'))
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::warning::RELEASE_KEYSTORE_BASE64 secret not set. Skipping signed Release APK."
            exit 0
          fi
          echo "Decoding release keystore..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
          export KEYSTORE_PATH="${{ github.workspace }}/my-upload-key.jks"
          ./gradlew assembleRelease --parallel --build-cache --daemon

      - name: Rename & Organize APKs
        run: |
          mkdir -p build-artifacts
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/AutoClickerPro-debug.apk
            echo "✅ Debug APK ready."
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/AutoClickerPro-release.apk
            echo "✅ Release APK ready."
          fi

      - name: Generate Release Notes
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        run: |
          echo "### AutoClicker Pro — Automated Release" > release_notes.md
          echo "" >> release_notes.md
          echo "Built automatically by GitHub Actions CI/CD." >> release_notes.md
          echo "" >> release_notes.md
          echo "#### What's New" >> release_notes.md
          echo "- Ultra-fast ride detection with 7 accessibility event types" >> release_notes.md
          echo "- Instant accept click (0 delay, exact center)" >> release_notes.md
          echo "- Live session stats (accepts, rejects, earnings, hit rate)" >> release_notes.md
          echo "- Vibration sensor trigger (FASTEST rate, 3-sample threshold)" >> release_notes.md
          echo "- Max price filter + Smart Detection settings" >> release_notes.md
          echo "" >> release_notes.md
          echo "#### Artifacts" >> release_notes.md
          if [ -f build-artifacts/AutoClickerPro-debug.apk ]; then
            echo "- **AutoClickerPro-debug.apk** — debug build, install directly for testing" >> release_notes.md
          fi
          if [ -f build-artifacts/AutoClickerPro-release.apk ]; then
            echo "- **AutoClickerPro-release.apk** — signed production build" >> release_notes.md
          fi
          echo "" >> release_notes.md
          echo "#### SHA-256 Checksums" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          sha256sum build-artifacts/*.apk | sed 's|build-artifacts/||' >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoClickerPro-APKs-${{ github.sha }}
          path: build-artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*.apk
          body_path: release_notes.md
          draft: false
          prerelease: false
          name: AutoClicker Pro ${{ github.ref_name || 'Manual-Build' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
