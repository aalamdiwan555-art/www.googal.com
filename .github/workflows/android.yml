name: Android CI/CD - Build & Release APK

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug / release / both)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant Gradle Wrapper Permissions
        run: chmod +x gradlew

      - name: Prepare .env stub
        run: |
          [ -f .env ] || touch .env
          grep -q "GEMINI_API_KEY" .env 2>/dev/null || echo "GEMINI_API_KEY=placeholder" >> .env

      - name: Stub google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "autoclicker-pro-ci",
              "storage_bucket": "autoclicker-pro-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.aistudio.autoclickerpro.vtxwsy"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder" }],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build Debug APK
        if: >-
          github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          github.event.inputs.build_type == 'debug' ||
          github.event.inputs.build_type == 'both'
        run: |
          ./gradlew assembleDebug \
            --parallel \
            --build-cache \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Build Release APK
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          github.event.inputs.build_type == 'release' ||
          github.event.inputs.build_type == 'both'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
            export KEYSTORE_PATH="${{ github.workspace }}/my-upload-key.jks"
          else
            echo "::warning::No keystore secret — building unsigned release APK."
          fi
          ./gradlew assembleRelease \
            --parallel \
            --build-cache \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseG1GC"

      - name: Collect APKs
        run: |
          mkdir -p build-artifacts
          for APK in \
            app/build/outputs/apk/debug/app-debug.apk \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk; do
            [ -f "$APK" ] || continue
            BASE=$(basename "$APK")
            DEST="build-artifacts/AutoClickerPro-${BASE#app-}"
            cp "$APK" "$DEST"
            echo "$(du -sh "$DEST" | cut -f1)  $DEST"
          done
          ls -lh build-artifacts/ || echo "No APKs collected"

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoClickerPro-APKs-${{ github.run_number }}
          path: build-artifacts/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
