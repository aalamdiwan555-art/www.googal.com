# ════════════════════════════════════════════════════
#  Gradle Build — Maximum Speed Configuration
# ════════════════════════════════════════════════════

# ── JVM ──────────────────────────────────────────────
# 4 GB heap + G1GC for low-pause GC during large builds
org.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dfile.encoding=UTF-8

# ── Parallelism ───────────────────────────────────────
org.gradle.parallel=true
org.gradle.workers.max=8

# ── Caching ───────────────────────────────────────────
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.configureondemand=true

# ── Daemon ────────────────────────────────────────────
org.gradle.daemon=true
org.gradle.daemon.idletimeout=10800000

# ── Kotlin ────────────────────────────────────────────
kotlin.code.style=official
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=true
kotlin.parallel.tasks.in.project=true

# ── Android ───────────────────────────────────────────
android.nonTransitiveRClass=true
android.useAndroidX=true

# ── Firebase / Google Services ────────────────────────
googleServices.missing.passthrough=true
